<!-- PROJECT: gym -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gym</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="icon.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym">
  <meta name="theme-color" content="#F5F5F5">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Sentry Error Monitoring -->
  <script>
    window.sentryOnLoad = function () {
      Sentry.init({
        environment: 'production',
        sampleRate: 1.0,
        ignoreErrors: [
          'ResizeObserver loop',
          'Non-Error promise rejection captured',
          /Loading chunk .* failed/,
          'Network request failed',
          /Failed to fetch/
        ],
        beforeSend: function(event) {
          var key = (event.exception && event.exception.values && event.exception.values[0])
                    ? event.exception.values[0].type + ':' + event.exception.values[0].value
                    : 'unknown';
          if (!window._sentryRateMap) window._sentryRateMap = {};
          var now = Date.now();
          if (!window._sentryRateMap[key]) window._sentryRateMap[key] = [];
          window._sentryRateMap[key].push(now);
          window._sentryRateMap[key] = window._sentryRateMap[key].filter(function(t) { return now - t < 60000; });
          if (window._sentryRateMap[key].length > 5) return null;
          return event;
        }
      });
      Sentry.setTag('app', 'gym');
    };
  </script>
  <script
    src="https://js.sentry-cdn.com/74d700d2b95307773edffc065bdd2c2d.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/debug-utils.js?v=1"></script>
  <link rel="stylesheet" href="style.css?v=20260328b">
</head>
<body>
  <!-- 잠금 화면 (Google 로그인) -->
  <div id="lockScreen" class="lock-overlay" style="display:none;">
    <div class="lock-card">
      <div class="lock-brand">Gym</div>
      <div class="lock-desc">개인 기록 공간입니다. 로그인해주세요.</div>
      <div id="googleSignInBtn"></div>
      <div class="lock-err" id="lockErr" style="color:#e85040;font-size:13px;margin-top:12px;"></div>
    </div>
  </div>

  <!-- 로딩 화면 -->
  <div id="loadingScreen" class="loading-screen">
    <img src="loading.jpg" alt="" class="loading-avatar">
    <div class="loading-shadow"></div>
    <div class="loading-text">불러오는 중</div>
  </div>

  <div id="app">
    <!-- 운동 진행 헤더 (숨겨진 상태) -->
    <header id="workoutHeader" class="workout-header" style="display:none;">
      <div class="wh-left">
        <button class="wh-back" id="workoutBackBtn" onclick="onWorkoutBack()">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div class="wh-center">
        <span class="wh-time" id="workoutTime"></span>
        <span class="wh-sep">|</span>
        <span class="wh-vol" id="workoutHeaderVol"></span>
      </div>
      <div class="wh-right" id="workoutTags"></div>
    </header>

    <!-- 휴식 타이머 -->
    <div id="restTimerBar" class="rest-timer-bar"></div>

    <!-- 메인 화면 (싱글 스크롤) -->
    <main id="main-view" class="main-view">
      <!-- 요약 메시지 -->
      <div id="summaryMsg" class="summary-msg"></div>

      <!-- 주간 캘린더 -->
      <div id="weekCal" class="week-cal-container"></div>

      <!-- 직전 운동 카드 -->
      <div id="lastWorkoutCard" class="last-workout-card"></div>

      <!-- 바텀시트 (숨겨진 상태) -->
      <div id="bottomSheetOverlay" class="bottom-sheet-overlay" style="display:none;" onclick="closeBottomSheet()"></div>
      <div id="bottomSheet" class="bottom-sheet" style="display:none;">
        <div class="bottom-sheet-handle"></div>
        <button class="bottom-sheet-close" onclick="closeBottomSheet()">✕</button>
        <div id="bottomSheetContent" class="bottom-sheet-content"></div>
      </div>
    </main>

    <!-- 통계/기록 화면 (숨겨진 상태) -->
    <div id="screen-stats" class="screen">
      <div id="statsContent" class="stats-screen-content"></div>
    </div>

    <!-- 설정 화면 (숨겨진 상태) -->
    <div id="screen-settings" class="screen">
      <div id="settingsContent" class="settings-content"></div>
    </div>

    <!-- 운동 진행 화면 (숨겨진 상태) -->
    <div id="screen-workout" class="screen">
      <div id="workoutContent" class="workout-content"></div>
    </div>

    <!-- 종목 추가 오버레이 (숨겨진 상태) -->
    <div id="addExerciseOverlay" class="screen add-exercise-overlay" style="display:none;">
      <div id="addExerciseContent" class="workout-content workout-select-mode"></div>
    </div>
  </div>

  <!-- 동기화 상태 표시 -->
  <div id="syncStatus" class="sync-status"></div>

  <!-- 운동 시작 버튼 (고정) -->
  <button class="start-workout" id="bottomBtn">START WORKOUT</button>

  <!-- JS 파일들 -->
  <script src="js/storage.js?v=20260326c"></script>
  <script src="js/data.js?v=20260325c"></script>
  <script src="js/ui.js?v=20260329b"></script>
  <script src="js/workout.js?v=20260327b"></script>
  <script src="js/stats.js?v=20260325c"></script>
  <script src="js/settings.js?v=20260325c"></script>
  <script src="js/sync.js?v=20260330a"></script>
  <script src="js/swipe-back.js?v=20260326p"></script>
  <script src="js/app.js?v=20260330a"></script>

  <!-- 액션시트 -->
  <div id="actionSheetOverlay" class="action-sheet-overlay" onclick="hideActionSheet()"></div>
  <div id="actionSheet" class="action-sheet"></div>

  <!-- 확인 모달 -->
  <div id="confirmModal" class="confirm-modal-overlay" style="display:none;">
    <div class="confirm-modal">
      <div class="confirm-modal-msg" id="confirmModalMsg"></div>
      <div class="confirm-modal-btns">
        <button class="confirm-modal-cancel" onclick="hideConfirm(false)">취소</button>
        <button class="confirm-modal-ok" onclick="hideConfirm(true)">확인</button>
      </div>
    </div>
  </div>
</body>
</html>
