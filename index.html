<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>운동 기록 - Workout Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 운동 진행 헤더 (숨겨진 상태) -->
    <header id="workoutHeader" class="workout-header" style="display:none;">
      <div class="wh-left">
        <span class="wh-timer" id="workoutTimer">00:00</span>
      </div>
      <div class="wh-center" id="workoutTags"></div>
      <div class="wh-right">
        <button class="wh-btn" onclick="showScreen('home')">완료</button>
      </div>
    </header>

    <!-- 휴식 타이머 -->
    <div id="restTimerBar" class="rest-timer-bar"></div>

    <!-- 메인 화면 (싱글 스크롤) -->
    <main id="main-view" class="main-view">
      <!-- 요약 메시지 -->
      <div id="summaryMsg" class="summary-msg"></div>

      <!-- 주간 캘린더 -->
      <div id="weekCal" class="week-cal-container"></div>

      <!-- 직전 운동 카드 -->
      <div id="lastWorkoutCard" class="last-workout-card"></div>

      <!-- 바텀시트 (숨겨진 상태) -->
      <div id="bottomSheetOverlay" class="bottom-sheet-overlay" style="display:none;" onclick="closeBottomSheet()"></div>
      <div id="bottomSheet" class="bottom-sheet" style="display:none;">
        <div class="bottom-sheet-handle"></div>
        <button class="bottom-sheet-close" onclick="closeBottomSheet()">✕</button>
        <div id="bottomSheetContent" class="bottom-sheet-content"></div>
      </div>
    </main>

    <!-- 운동 진행 화면 (숨겨진 상태) -->
    <div id="screen-workout" class="screen">
      <div id="workoutContent" class="workout-content"></div>
    </div>
  </div>

  <!-- 운동 시작 버튼 (고정) -->
  <button class="start-workout" onclick="startWorkoutFlow()">WORK OUT</button>

  <!-- JS 파일들 -->
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
